services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: flowmanager-backend
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: flowmanager-frontend
    depends_on:
      - backend
    environment:
      VITE_PROXY_TARGET: http://backend:8000
    ports:
      - "5173:5173"
    restart: unless-stopped
